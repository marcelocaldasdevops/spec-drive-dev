services:
  postgres:
    image: postgres:15-alpine
    container_name: api_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
      POSTGRES_DB: ${DB_NAME:-api_ecommerce}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - api_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d api_ecommerce"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: api_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - api_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: api_app
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://admin:admin123@postgres:5432/api_ecommerce?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: supersecret_access_key_dev
      JWT_ACCESS_EXPIRATION: 1d
      JWT_REFRESH_SECRET: supersecret_refresh_key_dev
      JWT_REFRESH_EXPIRATION: 7d
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - api_network
    command: >
      sh -c "npx prisma generate && npx prisma migrate deploy && node src/server.js"

volumes:
  postgres_data:
  redis_data:

networks:
  api_network:
    driver: bridge
